<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Complaint Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:500px;
    background:#181818;
    padding:35px;
    border-radius:20px;
    border:2px solid #d4af37;
    box-shadow:0 0 25px rgba(212,175,55,0.3);
}

h1{
    color:#d4af37;
    text-align:center;
    margin-bottom:25px;
}

input, textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

input:focus, textarea:focus{
    outline:2px solid #d4af37;
}

button{
    width:100%;
    padding:14px;
    background:#d4af37;
    color:black;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#f1c95a;
}

#msg{
    color:#d4af37;
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>V.S.B Engineering College
        Digital Complaint Portal</h1>

    <form id="complaintForm">
        <input type="text" id="name" placeholder="Enter Name" required>

        <input type="email" id="email" placeholder="Enter Email" required>

        <input type="text" id="department" placeholder="Enter Department" required>

        <input type="text" id="year" placeholder="Enter Year" required>



        <textarea id="complaint" rows="5"
        placeholder="Enter Your Complaint" required></textarea>

        <button type="submit">Submit Complaint</button>
    </form>

    <p id="msg"></p>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
